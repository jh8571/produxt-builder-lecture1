<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Face Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- TensorFlow.js and Teachable Machine Image library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-button">SWITCH THEME</button>
    </div>

    <!-- Lotto Section -->
    <div class="machine">
        <div class="machine-header">
            <h1>LUCKY NUMBER</h1>
        </div>
        <div class="display-screen">
            <div id="numbers-container" class="numbers-container">
                <!-- Numbers will be injected here by JavaScript -->
            </div>
        </div>
        <div class="machine-footer">
            <button id="generate-button" class="generate-button">
                GENERATE LOTTO
            </button>
        </div>
    </div>

    <!-- Animal Face Test Section -->
    <section class="animal-test-section">
        <div class="machine-header">
            <h1>ANIMAL FACE TEST</h1>
        </div>
        <div class="upload-area" id="upload-area">
            <input type="file" id="image-input" accept="image/*" hidden>
            <div id="image-preview" class="image-preview">
                <span id="upload-label">CLICK OR DRAG IMAGE</span>
            </div>
        </div>
        <div id="loading-spinner" class="spinner" style="display: none;"></div>
        <div id="result-container" class="result-container" style="display: none;">
            <h2 id="result-message"></h2>
            <div id="label-container" class="label-container"></div>
        </div>
        <button id="predict-button" class="generate-button" style="margin-top: 20px; display: none;">
            ANALYZE FACE
        </button>
    </section>

    <section class="contact-section">
        <h2>PARTNERSHIP</h2>
        <form action="https://formspree.io/f/xaqpzkaj" method="POST">
            <div class="form-group">
                <label for="name">NAME</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="_replyto" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">MESSAGE</label>
                <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="submit-button">SEND MESSAGE</button>
        </form>
    </section>

    <section class="comment-section">
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-rggcti80hp.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <script src="main.js"></script>
</body>
</html>
